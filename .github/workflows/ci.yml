name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.3.4

      - name: Ruff check (lint)
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format . --check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # Unit tests are pure-function tests (no S3/Postgres/network access),
        # so no real credentials are needed here -- DATABASE_URL/BUCKET_ID only
        # have to be *set* because src/core/config.py (Settings) fails fast at
        # import time if a required field is missing, not because anything
        # actually connects to Postgres or S3.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BUCKET_ID: ci-test-bucket
        run: pytest tests/unit -v
